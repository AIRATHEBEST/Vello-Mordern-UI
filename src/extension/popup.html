<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vello AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      min-height: 500px;
      background: linear-gradient(to bottom right, #0f172a, #0f172a);
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    }

    .header {
      background: linear-gradient(to right, #2563eb, #9333ea);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
    }

    .header-icon {
      font-size: 24px;
    }

    .container {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .model-selector {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .model-selector label {
      font-size: 12px;
      color: #cbd5e1;
      font-weight: 500;
    }

    .model-selector select {
      padding: 8px 12px;
      background: #1e293b;
      border: 1px solid #475569;
      border-radius: 6px;
      color: white;
      font-size: 14px;
    }

    .model-selector select:focus {
      outline: none;
      border-color: #2563eb;
    }

    .messages {
      height: 300px;
      overflow-y: auto;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      padding: 8px 12px;
      border-radius: 6px;
      max-width: 90%;
      word-wrap: break-word;
      font-size: 13px;
    }

    .message.user {
      background: #2563eb;
      color: white;
      align-self: flex-end;
    }

    .message.assistant {
      background: #334155;
      color: #e2e8f0;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      gap: 8px;
    }

    .input-area input {
      flex: 1;
      padding: 8px 12px;
      background: #1e293b;
      border: 1px solid #475569;
      border-radius: 6px;
      color: white;
      font-size: 14px;
    }

    .input-area input:focus {
      outline: none;
      border-color: #2563eb;
    }

    .input-area button {
      padding: 8px 12px;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    .input-area button:hover {
      background: #1d4ed8;
    }

    .input-area button:disabled {
      background: #64748b;
      cursor: not-allowed;
    }

    .settings-btn {
      padding: 6px 12px;
      background: #334155;
      border: 1px solid #475569;
      border-radius: 4px;
      color: #e2e8f0;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }

    .settings-btn:hover {
      background: #475569;
    }

    .settings-panel {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 12px;
      display: none;
      gap: 12px;
      flex-direction: column;
    }

    .settings-panel.show {
      display: flex;
    }

    .provider-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .provider-btn {
      padding: 8px;
      border: 1px solid #475569;
      border-radius: 4px;
      background: #0f172a;
      color: #cbd5e1;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .provider-btn.active {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
    }

    .provider-btn:hover {
      border-color: #64748b;
    }

    .loading {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #2563eb;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">🤖</span>
    <span>Vello AI</span>
  </div>

  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <div class="model-selector" style="flex: 1;">
        <label>Select Model</label>
        <select id="modelSelect">
          <option value="">Loading models...</option>
        </select>
      </div>
      <button class="settings-btn" id="settingsBtn">⚙️</button>
    </div>

    <div class="settings-panel" id="settingsPanel">
      <div>
        <label style="font-size: 12px; color: #cbd5e1; display: block; margin-bottom: 6px;">
          API Provider
        </label>
        <div class="provider-buttons">
          <button class="provider-btn active" data-provider="vello">Vello</button>
          <button class="provider-btn" data-provider="ollama">Ollama</button>
        </div>
      </div>

      <div id="ollamaSettings" style="display: none;">
        <label style="font-size: 12px; color: #cbd5e1; display: block; margin-bottom: 6px;">
          Ollama URL
        </label>
        <input
          type="text"
          id="ollamaUrl"
          placeholder="http://localhost:11434"
          style="width: 100%; padding: 6px 8px; background: #0f172a; border: 1px solid #475569; border-radius: 4px; color: white; font-size: 12px;"
        />
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <input
        type="text"
        id="messageInput"
        placeholder="Ask Vello AI..."
        disabled
      />
      <button id="sendBtn" disabled>→</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
